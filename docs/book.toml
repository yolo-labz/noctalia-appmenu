[book]
title = "noctalia-appmenu"
authors = ["Pedro H S Balbino <phsb5321@gmail.com>"]
description = "macOS-style global menu for noctalia-shell on niri."
src = "."
language = "en"

[output.html]
git-repository-url = "https://github.com/yolo-labz/noctalia-appmenu"
edit-url-template = "https://github.com/yolo-labz/noctalia-appmenu/edit/main/docs/{path}"
default-theme = "ayu"
preferred-dark-theme = "ayu"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true
