[book]
title = "noctalia-appmenu"
authors = ["Pedro H S Balbino <phsb5321@gmail.com>"]
description = "macOS-style global menu for noctalia-shell on niri."
src = "."
language = "en"

[output.html]
git-repository-url = "https://github.com/yolo-labz/repository-url-template"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/yolo-labz/noctalia-appmenu/edit/main/docs/{path}"
default-theme = "ayu"
preferred-dark-theme = "ayu"
copy-fonts = true
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true

[output.linkcheck]
follow-web-links = false
warning-policy = "error"

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.0.2"

[preprocessor.mermaid]
command = "mdbook-mermaid"
