# OSV-Scanner V2 configuration.
#
# Run locally:
#   osv-scanner scan source --recursive .
#
# CI runs `osv-scanner` on every PR + weekly schedule via
# .github/workflows/osv-scan.yml. The CI invocation auto-discovers
# this file at the repo root.
#
# Matches the ignore list in `deny.toml` so cargo-deny and OSV-Scanner
# agree on which advisories are accepted-risk. Every entry MUST carry
# an inline rationale; keep the two configs in sync or downgrade
# silently to a false negative on one of them.

[[IgnoredVulns]]
