# git-cliff — generates CHANGELOG.md from Conventional Commits.
# Hand-edits are forbidden (constitution principle VI).

[changelog]
header = """
# Changelog

All notable changes to noctalia-appmenu are documented here. Format follows
[Keep a Changelog 1.1.0](https://keepachangelog.com/en/1.1.0/) and adheres to
[Semantic Versioning 2.0.0](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/yolo-labz/noctalia-appmenu/commit/{{ commit.id }}))
    {% endfor %}
{% endfor %}
"""

trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Chore" },
  { message = "^revert", group = "Reverts" },
  { message = "^governance", group = "Governance" },
]

filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = "v0.0.*"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
