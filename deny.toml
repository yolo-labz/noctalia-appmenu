# cargo-deny configuration for the noctalia-appmenu-bridge crate.
#
# Run locally:
#   cargo deny --all-features check
#
# CI runs `cargo deny check` on every PR + scheduled weekly via
# .github/workflows/cargo-deny.yml. Fail-the-build is intentional;
# pin the offending crate in [bans.skip] only with an inline
# rationale + an issue link.

[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unlicense",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
  { crate = "sha1", reason = "broken hash; use sha2" },
  { crate = "md5", reason = "broken hash" },
  { crate = "openssl-sys:<0.9.60", reason = "CVE-laden" },
  { crate = "time:<0.2.23", reason = "RUSTSEC-2020-0071" },
  { crate = "chrono:<0.4.20", reason = "RUSTSEC-2020-0159" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["yolo-labz", "rust-lang", "rustsec", "EmbarkStudios", "tokio-rs", "dbus2"]
