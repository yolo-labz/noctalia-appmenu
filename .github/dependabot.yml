version: 2

updates:
  - package-ecosystem: cargo
    directory: /bridge
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Recife
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "fix(bridge)"
      include: scope
    # Ignore major bumps for breaking-API stacks until a deliberate
    # migration spec lands. zbus 5.x reworks async surfaces; bridge
    # registrar/proxy/atspi modules need targeted port work. Keep
    # patch + minor bumps flowing.
    ignore:
      - dependency-name: "zbus"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zvariant"
        update-types: ["version-update:semver-major"]
    groups:
      zbus-stack:
        patterns: ["zbus", "zvariant"]
      tokio-stack:
        patterns: ["tokio*", "futures*"]
      tracing:
        patterns: ["tracing*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Recife
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
