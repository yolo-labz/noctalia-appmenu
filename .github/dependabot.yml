version: 2

updates:
  - package-ecosystem: cargo
    directory: /bridge
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Recife
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    # `include: scope` makes Dependabot append `(deps)` to the type.
    # Pairing it with `prefix: "fix(bridge)"` produced double-scope
    # titles like `fix(bridge)(deps): ...` that fail commitlint's
    # single-scope regex. Use bare `fix` so the rendered title is
    # `fix(deps): bump <pkg> from X to Y` — single-scope, valid.
    # The bridge path stays visible in the PR body footer.
    commit-message:
      prefix: "fix"
      include: scope
    # Ignore major bumps for breaking-API stacks until a deliberate
    # migration spec lands. zbus 5.x reworks async surfaces; bridge
    # registrar/proxy/atspi modules need targeted port work. Keep
    # patch + minor bumps flowing.
    ignore:
      - dependency-name: "zbus"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zvariant"
        update-types: ["version-update:semver-major"]
    groups:
      zbus-stack:
        patterns: ["zbus", "zvariant"]
      tokio-stack:
        patterns: ["tokio*", "futures*"]
      tracing:
        patterns: ["tracing*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Recife
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    ignore:
      # cargo-deny-action v2.0.19 fails on this repo's self-hosted
      # runners with a `git config --global --add safe.directory`
      # error inside the Docker container that wraps cargo-deny.
      # Pinned at v2.0.17 in cargo-deny.yml until upstream lands a
      # fix; otherwise Dependabot re-suggests the bump every week
      # and re-breaks main. Re-evaluate quarterly.
      - dependency-name: "EmbarkStudios/cargo-deny-action"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
    # Group all minor/patch action bumps into ONE PR. Without this,
    # Dependabot splits github/codeql-action/{init,analyze,upload-sarif}
    # into separate PRs; the three subactions share one version, so
    # merging one at a time skews CodeQL ("Loaded config for version X,
    # running version Y") and breaks analysis on main. Majors stay
    # separate for deliberate review.
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
