version: 2

updates:
  - package-ecosystem: cargo
    directory: /bridge
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Recife
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    # `include: scope` makes Dependabot append `(deps)` to the type.
    # Pairing it with `prefix: "fix(bridge)"` produced double-scope
    # titles like `fix(bridge)(deps): ...` that fail commitlint's
    # single-scope regex. Use bare `fix` so the rendered title is
    # `fix(deps): bump <pkg> from X to Y` — single-scope, valid.
    # The bridge path stays visible in the PR body footer.
    commit-message:
      prefix: "fix"
      include: scope
    # Ignore major bumps for breaking-API stacks until a deliberate
    # migration spec lands. zbus 5.x reworks async surfaces; bridge
    # registrar/proxy/atspi modules need targeted port work. Keep
    # patch + minor bumps flowing.
    ignore:
      - dependency-name: "zbus"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zvariant"
        update-types: ["version-update:semver-major"]
    groups:
      zbus-stack:
        patterns: ["zbus", "zvariant"]
      tokio-stack:
        patterns: ["tokio*", "futures*"]
      tracing:
        patterns: ["tracing*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Recife
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
