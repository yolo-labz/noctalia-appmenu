name: pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs/adr/**"
      - "**/README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build mdbook
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build via nix devShell
        # mdbook resolves `-d` relative to CWD, not the book src; `-d ../book`
        # landed the output in `$_work/noctalia-appmenu/book` (one level above
        # $GITHUB_WORKSPACE) so the upload step's `tar -C book` exited 2 with
        # "No such file or directory". Anchor the path on $GITHUB_WORKSPACE
        # via an env var so the artifact lands at `<workspace>/book`.
        env:
          BOOK_OUT: ${{ github.workspace }}/book
        run: nix develop --command bash -c 'mdbook build docs -d "$BOOK_OUT"'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: book

  deploy:
    name: Deploy mdbook
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
