name: actionlint + zizmor

on:
  push:
    branches: [main]
  # Run on EVERY PR — this check is in the required-status-checks set,
  # so a `paths:` filter creates a dead-required-check trap on PRs that
  # don't touch `.github/workflows/`. The job is fast (~15s) and runs
  # standalone tools (actionlint + zizmor) so paying it on every PR is
  # cheap insurance against merge-blocked-by-skipped-required-check.
  pull_request:
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    name: workflow static analysis
    # FR-023 / ADR-0013: runner-agnostic label set. Any runner
    # registered with the `noctalia-appmenu` project label is a valid
    # host. The historical `desktop` host-pin existed because vm103's
    # job-started hook (`runner-balloon-hook.sh`) wrote NODE_OPTIONS
    # to $GITHUB_ENV, which broke actionlint setup with: "Can't store
    # NODE_OPTIONS output parameter using '$GITHUB_ENV' command". The
    # upstream remediation is to fix the runner hook on vm103 (or any
    # runner that exhibits the pattern) — encoding the workaround at
    # the workflow level violates ADR-0013 and creates a single point
    # of failure when the desktop host is down. This check is in the
    # required-status-checks set so it stays runner-agnostic; if a
    # runner is poisoned, fix the runner.
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint via gh release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          ACTIONLINT_VERSION="1.7.12"
          ACTIONLINT_AMD64_SHA256="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          ACTIONLINT_ARM64_SHA256="325e971b6ba9bfa504672e29be93c24981eeb1c07576d730e9f7c8805afff0c6"
          arch="$(uname -m)"
          case "$arch" in
            x86_64) tarball_arch="amd64"; expected_sha="$ACTIONLINT_AMD64_SHA256" ;;
            aarch64|arm64) tarball_arch="arm64"; expected_sha="$ACTIONLINT_ARM64_SHA256" ;;
            *) echo "::error::unsupported arch for actionlint: $arch"; exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_${tarball_arch}.tar.gz"
          gh release download "v${ACTIONLINT_VERSION}" \
            --repo rhysd/actionlint \
            --pattern "${tarball}" \
            --output "/tmp/${tarball}"
          actual_sha="$(sha256sum "/tmp/${tarball}" | awk '{print $1}')"
          if [ "$actual_sha" != "$expected_sha" ]; then
            echo "::error::actionlint tarball sha256 mismatch — expected $expected_sha got $actual_sha"
            exit 1
          fi
          tar xzf "/tmp/${tarball}" -C "$HOME/.local/bin" actionlint
          rm "/tmp/${tarball}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/actionlint" --version

      - name: Install zizmor via gh release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          ZIZMOR_VERSION="1.24.1"
          ZIZMOR_AMD64_SHA256="a8000f3c683319a523d3b20df0e75457ba591f049cfcbfa98966631b56733c03"
          ZIZMOR_ARM64_SHA256="d66e37ef8a375fb07939c630ebf9709a6e0f20242bdc3faf672a7ed97e0b768d"
          arch="$(uname -m)"
          case "$arch" in
            x86_64) triple="x86_64-unknown-linux-gnu"; expected_sha="$ZIZMOR_AMD64_SHA256" ;;
            aarch64|arm64) triple="aarch64-unknown-linux-gnu"; expected_sha="$ZIZMOR_ARM64_SHA256" ;;
            *) echo "::error::unsupported arch for zizmor"; exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          tarball="zizmor-${triple}.tar.gz"
          gh release download "v${ZIZMOR_VERSION}" \
            --repo zizmorcore/zizmor \
            --pattern "${tarball}" \
            --output "/tmp/${tarball}"
          actual_sha="$(sha256sum "/tmp/${tarball}" | awk '{print $1}')"
          if [ "$actual_sha" != "$expected_sha" ]; then
            echo "::error::zizmor tarball sha256 mismatch — expected $expected_sha got $actual_sha"
            exit 1
          fi
          tar xzf "/tmp/${tarball}" -C "$HOME/.local/bin" zizmor
          rm "/tmp/${tarball}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/zizmor" --version

      - name: actionlint
        run: actionlint -color

      - name: zizmor enforce
        run: zizmor --format=plain .github/workflows/
