name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "bridge/Cargo.toml"
      - "bridge/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/cargo-deny.yml"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: cargo-deny check
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        check: [advisories, bans, licenses, sources]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: cargo deny
        # Pinned to v2.0.17 — v2.0.19 (PR #147) failed on this repo's
        # self-hosted runners with `fatal: detected dubious ownership
        # in repository at '/github/home/.cargo/advisory-db/...'`.
        # cargo-deny-action runs cargo-deny inside a Docker container;
        # the advisory-db checkout's UID inside the container does not
        # match the host runner's notroot UID, so git's safe.directory
        # check refuses to read FETCH_HEAD timestamps. v2.0.17 did not
        # trip the check. Revert until upstream lands a fix; Dependabot
        # is told to skip this bump via ignore rule in dependabot.yml.
        uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17
        with:
          command: check ${{ matrix.check }}
          manifest-path: bridge/Cargo.toml
