name: perf

on:
  pull_request:
    paths:
      - "bridge/src/**"
      - "bridge/benches/**"
      - "bridge/Cargo.toml"
      - "bridge/Cargo.lock"
      - ".github/workflows/perf.yml"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  divan:
    name: divan benches (wall clock)
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run divan benches
        run: nix develop --command bash -c 'cd bridge && cargo bench --bench hotpath -- --output-format pretty 2>&1 | tee divan.txt'

      - name: Upload divan output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: divan-output
          path: bridge/divan.txt
          retention-days: 14

  iai:
    name: iai-callgrind (deterministic instruction count)
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Build base (PR target) bench binary
        if: github.event_name == 'pull_request'
        run: |
          set -eu
          git fetch origin "$BASE_REF"
          git checkout "origin/$BASE_REF" -- bridge
          nix develop --command bash -c 'cd bridge && cargo build --bench iai --locked'
          mv bridge/target/release/deps/iai-* "$RUNNER_TEMP/iai-base" 2>/dev/null || true
          git checkout HEAD -- bridge

      - name: Run iai benches (HEAD)
        run: nix develop --command bash -c 'cd bridge && cargo bench --bench iai 2>&1 | tee iai.txt'

      - name: Upload iai output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iai-output
          path: bridge/iai.txt
          retention-days: 14
