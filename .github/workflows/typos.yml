name: typos

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: typos
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: crate-ci/typos@5c4feb79c242f07ca644aeca31aa4292e0b85fe4 # v1.45.2
        with:
          config: typos.toml
