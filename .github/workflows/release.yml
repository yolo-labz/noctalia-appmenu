name: release

on:
  push:
    tags: ['v*']

permissions: {}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-attest:
    name: Build, attest, publish
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Export SOURCE_DATE_EPOCH
        run: |
          set -eu
          SDE=$(git log -1 --format=%ct)
          echo "SOURCE_DATE_EPOCH=$SDE" >> "$GITHUB_ENV"

      - name: Build bridge (nix)
        run: |
          set -eu
          nix build .#noctalia-appmenu-bridge --print-build-logs --accept-flake-config
          mkdir -p dist
          cp -L result/bin/noctalia-appmenu-bridge dist/noctalia-appmenu-bridge-linux-x86_64
          rm -f result

      - name: Build plugin tarball
        run: |
          set -eu
          tar --owner=0 --group=0 --numeric-owner --sort=name \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              -czf dist/noctalia-appmenu-plugin.tar.gz \
              -C plugin .

      - name: Generate SBOMs (CycloneDX 1.6 + SPDX 2.3) via syft
        # NOTE: syft v1.43.0/v1.44.0 max at cyclonedx-json @ 1.6;
        # CycloneDX 1.7 spec is published but not yet emittable by syft.
        # Tracked in docs/adr/ADR-0026. Revisit on the next syft release.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          SYFT_VERSION="1.43.0"
          SYFT_AMD64_SHA256="7b98251d2d08926bb5d4639b56b1f0996a58ef6667c5830e3fe3cd3ad5f4214a"
          mkdir -p "$HOME/.local/bin"
          tarball="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          gh release download "v${SYFT_VERSION}" --repo anchore/syft --pattern "${tarball}" --output "$RUNNER_TEMP/${tarball}" --clobber
          actual_sha="$(sha256sum "$RUNNER_TEMP/${tarball}" | awk '{print $1}')"
          if [ "$actual_sha" != "$SYFT_AMD64_SHA256" ]; then
            echo "::error::syft tarball sha256 mismatch"; exit 1
          fi
          tar xzf "$RUNNER_TEMP/${tarball}" -C "$HOME/.local/bin" syft
          export PATH="$HOME/.local/bin:$PATH"
          syft . \
            -o cyclonedx-json@1.6=dist/sbom.cdx.json \
            -o spdx-json=dist/sbom.spdx.json

      - name: Verify CycloneDX SBOM is 1.6
        # FR-021 (relaxed per ADR-0026): assert specVersion 1.6 so a
        # future syft upgrade that adds 1.7 support is caught at
        # release-cut time, not by a downstream consumer.
        run: |
          set -eu
          fmt=$(jq -r '.bomFormat' dist/sbom.cdx.json)
          ver=$(jq -r '.specVersion' dist/sbom.cdx.json)
          if [ "$fmt" != "CycloneDX" ] || [ "$ver" != "1.6" ]; then
            echo "::error::CycloneDX SBOM mismatch — bomFormat=${fmt} specVersion=${ver} (want CycloneDX 1.6)"
            exit 1
          fi
          echo "CycloneDX 1.6 OK"

      - name: Generate cargo-cyclonedx SBOM (Rust-native)
        # cargo-cyclonedx writes to <crate_root>/<package>.cdx.json by
        # default. --override-filename rejects path separators (Illegal
        # characters in custom prefix string: /). Run then move.
        run: |
          set -eu
          nix develop --command bash -c 'cd bridge && cargo cyclonedx --format json'
          mv bridge/*.cdx.json dist/sbom.cargo.cdx.json

      - name: Compute checksums
        run: |
          cd dist
          sha256sum noctalia-appmenu-bridge-linux-x86_64 noctalia-appmenu-plugin.tar.gz > checksums.txt
          cat checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: 'dist/checksums.txt'

      - name: Attest SBOM (CycloneDX 1.6)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-checksums: 'dist/checksums.txt'
          sbom-path: 'dist/sbom.cdx.json'

      - name: Attest SBOM (SPDX 2.3)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-checksums: 'dist/checksums.txt'
          sbom-path: 'dist/sbom.spdx.json'

      - name: Install git-cliff via gh release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          GC_VERSION=2.6.1
          tarball="git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "v${GC_VERSION}" --repo orhun/git-cliff --pattern "${tarball}" --output "$RUNNER_TEMP/${tarball}" --clobber
          tar -xzf "$RUNNER_TEMP/${tarball}" -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/git-cliff-${GC_VERSION}/git-cliff" "$HOME/.local/bin/git-cliff"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate CHANGELOG
        run: git-cliff -o CHANGELOG.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file CHANGELOG.md \
            dist/noctalia-appmenu-bridge-linux-x86_64 \
            dist/noctalia-appmenu-plugin.tar.gz \
            dist/checksums.txt \
            dist/sbom.cdx.json \
            dist/sbom.spdx.json \
            dist/sbom.cargo.cdx.json
