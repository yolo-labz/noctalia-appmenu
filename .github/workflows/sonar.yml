name: SonarQube scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  scan:
    name: SonarQube standalone scan
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout (full history for blame-based coverage)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Skip if SonarQube host not configured
        id: check
        env:
          HOST: ${{ vars.SONAR_HOST_URL }}
        run: |
          if [ -z "$HOST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "vars.SONAR_HOST_URL not set — skipping Sonar scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build coverage (bridge)
        if: steps.check.outputs.skip == 'false'
        run: nix develop --command bash -c 'cd bridge && cargo-llvm-cov llvm-cov --all-features --workspace --lcov --output-path lcov.info'

      - name: SonarQube scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
