name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bridge-test:
    name: Bridge — cargo test
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run tests via nix devShell
        run: nix develop --command bash -c 'cd bridge && cargo test --all-features --locked --no-fail-fast'

      - name: Coverage (cargo-llvm-cov)
        run: nix develop --command bash -c 'cd bridge && cargo-llvm-cov llvm-cov --all-features --workspace --lcov --output-path lcov.info'

      - name: Upload coverage artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-coverage
          path: bridge/lcov.info
          retention-days: 1

  plugin-lint:
    name: Plugin — qmllint
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: qmllint over plugin/*.qml — emit SARIF + console output
        # FR-024: lint every QML file under plugin/ (globbed so future
        # SubmenuPopup.qml from Lane B is auto-included). qmllint has
        # no native SARIF emitter; transform stable JSON output via jq
        # into SARIF 2.1.0 for upload to GitHub code-scanning. Exit
        # code is preserved so a hard qmllint failure still fails the
        # job — SARIF upload is additive.
        id: qmllint
        run: |
          set -eu
          mapfile -t qml_files < <(find plugin -maxdepth 1 -name '*.qml' -print | sort)
          mkdir -p .qmllint
          # Empty-glob branch: emit an empty SARIF document (heredoc so
          # the `$schema` key is a JSON literal, not a shell expansion).
          if [ ${#qml_files[@]} -eq 0 ]; then
            echo "::warning::no plugin/*.qml found — skipping qmllint"
            cat > qmllint.sarif <<'EMPTY_SARIF'
          {"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"qmllint","informationUri":"https://doc.qt.io/qt-6/qtquick-tool-qmllint.html"}},"results":[]}]}
          EMPTY_SARIF
            exit 0
          fi
          : > .qmllint/raw.json
          nix develop --command qmllint --version
          # Run once per file so a parse failure in one doesn't lose
          # findings from the others. Preserve qmllint's exit code so
          # a hard parse failure still fails the job — SARIF upload
          # itself is additive.
          rc=0
          for f in "${qml_files[@]}"; do
            echo "::group::qmllint $f"
            # qmllint 6.x: --json <output-file> writes the report to a
            # path, not stdout. Two positional args: --json OUT IN.
            tmp_json=$(mktemp --suffix=.qmllint.json)
            if ! nix develop --command qmllint --json "$tmp_json" "$f"; then
              rc=1
            fi
            cat "$tmp_json" >> .qmllint/raw.json
            rm -f "$tmp_json"
            echo "::endgroup::"
          done
          # jq filter lives in a heredoc — single quotes around jq
          # variables (`$file`) and the SARIF `$schema` JSON key are
          # intentional jq/JSON literals, not shell expansions.
          cat > .qmllint/sarif.jq <<'JQ'
          def map_sev: if . == "error" then "error" elif . == "warning" then "warning" else "note" end;
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            version: "2.1.0",
            runs: [{
              tool: { driver: {
                name: "qmllint",
                informationUri: "https://doc.qt.io/qt-6/qtquick-tool-qmllint.html",
                rules: []
              }},
              results: [
                ( .[] | .files[]? as $file
                  | $file.warnings[]?
                  | {
                      ruleId: (.type // "qmllint"),
                      level: ((.type // "warning") | map_sev),
                      message: { text: (.message // "qmllint diagnostic") },
                      locations: [{
                        physicalLocation: {
                          artifactLocation: { uri: ($file.filename // "unknown.qml") },
                          region: {
                            startLine: (.line // 1),
                            startColumn: (.column // 1)
                          }
                        }
                      }]
                    }
                )
              ]
            }]
          }
          JQ
          nix develop --command jq -s -f .qmllint/sarif.jq .qmllint/raw.json > qmllint.sarif
          echo "qmllint diagnostics: $(nix develop --command jq '.runs[0].results | length' qmllint.sarif)"
          exit $rc

      - name: Upload qmllint SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: qmllint.sarif
          category: qmllint

      - name: manifest schema check
        # Mirror noctalia-shell's `validateManifest` (PluginRegistry.qml):
        # required fields + entryPoints.barWidget present + version is
        # semver. v0.1.0..v0.1.4 shipped a manifest with `entrypoint`
        # (singular) + `widgetIds` — both ignored by the loader, plugin
        # never registered, widget invisible. ADR-0017 covers the
        # v0.1.5 fix. Inputs are repo-tracked files only — no
        # github.event.* / github.head_ref / etc. used here.
        run: |
          set -eu
          M=plugin/manifest.json
          fail() { echo "::error file=${M}::$1"; exit 1; }
          jq -e 'has("id") and has("name") and has("version") and has("author") and has("description") and has("entryPoints")' "$M" > /dev/null \
            || fail "manifest missing required field (id|name|version|author|description|entryPoints)"
          jq -re '.version' "$M" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || fail "version is not semver x.y.z"
          jq -e '.entryPoints.barWidget' "$M" > /dev/null \
            || fail "entryPoints.barWidget missing"
          jq -re '.entryPoints.barWidget' "$M" | xargs -I {} test -f "plugin/{}" \
            || fail "entryPoints.barWidget points at non-existent QML file"
          jq -e 'has("entrypoint") | not' "$M" > /dev/null \
            || fail "old singular 'entrypoint' field present — use entryPoints.barWidget"
          jq -e 'has("widgetIds") | not' "$M" > /dev/null \
            || fail "obsolete 'widgetIds' field present — noctalia derives id from pluginId"
          echo "manifest OK"

  nix-flake-check:
    name: Nix flake check
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - run: nix flake check --print-build-logs --accept-flake-config

      - run: nix build .#noctalia-appmenu-bridge --print-build-logs --accept-flake-config

      - name: Smoke (binary boots --version)
        run: ./result/bin/noctalia-appmenu-bridge --version

  commitlint:
    name: PR title commitlint
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 5
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: validate PR title (squash-merge subject)
        run: |
          subject="$PR_TITLE"
          if ! [[ "$subject" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/,-]+\))?!?:\ .+ ]]; then
            echo "::error::PR title does not follow Conventional Commits: $subject"
            exit 1
          fi
          if [ ${#subject} -gt 72 ]; then
            echo "::error::PR title is ${#subject} chars; keep it <=72: $subject"
            exit 1
          fi
          echo "ok: $subject"

  atspi-integration:
    name: AT-SPI integration test
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run AT-SPI integration test (file-existence gated)
        # FR-022: exercises Lane A's fake-AT-SPI-registry harness at
        # bridge/tests/atspi_integration.rs. Until Lane A merges, the
        # file is absent and this job no-ops with success so Lane D's
        # required-check stays green vacuously. Once Lane A merges, a
        # follow-up commit removes this gate so absence → red CI.
        run: |
          set -eu
          if [ ! -f bridge/tests/atspi_integration.rs ]; then
            echo "::notice::bridge/tests/atspi_integration.rs not present yet (Lane A pending) — skipping"
            exit 0
          fi
          nix develop --command bash -c 'cd bridge && cargo test --test atspi_integration --locked --no-fail-fast'
