name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bridge-test:
    name: Bridge — cargo test
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run tests via nix devShell
        run: nix develop --command bash -c 'cd bridge && cargo test --all-features --locked --no-fail-fast'

      - name: Coverage (cargo-llvm-cov)
        run: nix develop --command bash -c 'cd bridge && cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info'

      - name: Upload coverage artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bridge-coverage
          path: bridge/lcov.info
          retention-days: 1

  plugin-lint:
    name: Plugin — qmllint
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: qmllint
        run: |
          nix develop --command bash -c '
            qmllint --version
            qmllint plugin/BarWidget.qml plugin/components/*.qml > qmllint.sarif
          '

      - name: Upload qmllint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: qmllint.sarif
          category: qmllint
        continue-on-error: true

  nix-flake-check:
    name: Nix flake check
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - run: nix flake check --print-build-logs --accept-flake-config

      - run: nix build .#noctalia-appmenu-bridge --print-build-logs --accept-flake-config

      - name: Smoke (binary boots --version)
        run: ./result/bin/noctalia-appmenu-bridge --version

  commitlint:
    name: PR title commitlint
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 5
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: validate PR title (squash-merge subject)
        run: |
          subject="$PR_TITLE"
          if ! [[ "$subject" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/,-]+\))?!?:\ .+ ]]; then
            echo "::error::PR title does not follow Conventional Commits: $subject"
            exit 1
          fi
          if [ ${#subject} -gt 72 ]; then
            echo "::error::PR title is ${#subject} chars; keep it <=72: $subject"
            exit 1
          fi
          echo "ok: $subject"
