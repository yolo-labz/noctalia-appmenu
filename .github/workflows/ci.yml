name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bridge-test:
    name: Bridge — cargo test
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run tests via nix devShell
        run: nix develop --command bash -c 'cd bridge && cargo test --all-features --locked --no-fail-fast'

      - name: Coverage (cargo-llvm-cov)
        run: nix develop --command bash -c 'cd bridge && cargo-llvm-cov llvm-cov --all-features --workspace --lcov --output-path lcov.info'

      - name: Upload coverage artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-coverage
          path: bridge/lcov.info
          retention-days: 1

  plugin-lint:
    name: Plugin — qmllint
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: qmllint
        # qmllint has no native SARIF emitter; we just verify exit code
        # and pipe output to console for human review. plugin/components/
        # was retired in v0.1.3 (BarWidget FileView rewrite); only the
        # top-level BarWidget.qml ships in v0.1.x.
        run: nix develop --command bash -c 'qmllint --version && qmllint plugin/BarWidget.qml'

      - name: manifest schema check
        # Mirror noctalia-shell's `validateManifest` (PluginRegistry.qml):
        # required fields + entryPoints.barWidget present + version is
        # semver. v0.1.0..v0.1.4 shipped a manifest with `entrypoint`
        # (singular) + `widgetIds` — both ignored by the loader, plugin
        # never registered, widget invisible. ADR-0017 covers the
        # v0.1.5 fix. Inputs are repo-tracked files only — no
        # github.event.* / github.head_ref / etc. used here.
        run: |
          set -eu
          M=plugin/manifest.json
          fail() { echo "::error file=${M}::$1"; exit 1; }
          jq -e 'has("id") and has("name") and has("version") and has("author") and has("description") and has("entryPoints")' "$M" > /dev/null \
            || fail "manifest missing required field (id|name|version|author|description|entryPoints)"
          jq -re '.version' "$M" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || fail "version is not semver x.y.z"
          jq -e '.entryPoints.barWidget' "$M" > /dev/null \
            || fail "entryPoints.barWidget missing"
          jq -re '.entryPoints.barWidget' "$M" | xargs -I {} test -f "plugin/{}" \
            || fail "entryPoints.barWidget points at non-existent QML file"
          jq -e 'has("entrypoint") | not' "$M" > /dev/null \
            || fail "old singular 'entrypoint' field present — use entryPoints.barWidget"
          jq -e 'has("widgetIds") | not' "$M" > /dev/null \
            || fail "obsolete 'widgetIds' field present — noctalia derives id from pluginId"
          echo "manifest OK"

  nix-flake-check:
    name: Nix flake check
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - run: nix flake check --print-build-logs --accept-flake-config

      - run: nix build .#noctalia-appmenu-bridge --print-build-logs --accept-flake-config

      - name: Smoke (binary boots --version)
        run: ./result/bin/noctalia-appmenu-bridge --version

  commitlint:
    name: PR title commitlint
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 5
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: validate PR title (squash-merge subject)
        run: |
          subject="$PR_TITLE"
          if ! [[ "$subject" =~ ^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/,-]+\))?!?:\ .+ ]]; then
            echo "::error::PR title does not follow Conventional Commits: $subject"
            exit 1
          fi
          if [ ${#subject} -gt 72 ]; then
            echo "::error::PR title is ${#subject} chars; keep it <=72: $subject"
            exit 1
          fi
          echo "ok: $subject"
