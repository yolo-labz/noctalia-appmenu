name: codecov

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  coverage:
    name: cargo-llvm-cov + Codecov upload
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate LCOV via cargo-llvm-cov
        run: nix develop --command bash -c 'cd bridge && cargo-llvm-cov llvm-cov --all-features --workspace --lcov --output-path lcov.info'

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5.0.7
        with:
          files: bridge/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-lcov
          path: bridge/lcov.info
          retention-days: 7
