name: codecov

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  coverage:
    name: cargo-llvm-cov + Codecov upload
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate LCOV via cargo-llvm-cov
        run: nix develop --command bash -c 'cd bridge && cargo-llvm-cov llvm-cov --all-features --workspace --lcov --output-path lcov.info'

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5.0.7
        with:
          files: bridge/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          # codecov-action runs `git config --global --add safe.directory`
          # internally; on this self-hosted runner $HOME/.config/git/config
          # is intermittently a read-only mount, so that write fails with
          # exit 255 *before* the upload (fail_ci_if_error only suppresses
          # upload errors, not this crash). Redirect --global writes to a
          # per-job writable temp so the safe.directory step always succeeds.
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/codecov-gitconfig

      - name: Upload coverage as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-lcov
          path: bridge/lcov.info
          retention-days: 7
