name: cargo-machete

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "bridge/Cargo.toml"
      - "bridge/Cargo.lock"
      - ".github/workflows/cargo-machete.yml"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: detect unused deps
    # Require `desktop` label — machete needs cargo/rustc on PATH and
    # vm103 doesn't ship a rust toolchain. dtolnay/rust-toolchain
    # action collides with desktop's existing rustup install
    # ("cannot install while Rust is installed" + .profile EACCES),
    # so route to the desktop runner that already has cargo + a
    # job-started hook reclaiming `.git` perms.
    runs-on: [self-hosted, Linux, X64, noctalia-appmenu, desktop]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Use the nix devShell instead of the bnjbvr/cargo-machete
      # action — the action's binary fallback chain (precompiled
      # tarball → `cargo install`) breaks against this runner's
      # rustup-without-default state, and the devShell already pins
      # cargo-machete via nixpkgs.
      - name: cargo machete (via nix devShell)
        run: nix develop --command cargo machete bridge
