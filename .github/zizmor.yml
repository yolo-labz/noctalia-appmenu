rules:
  # Documented exceptions (mirroring `wa` repo's posture)
  self-hosted-runner:
    ignore:
      - .github/workflows/ci.yml
      - .github/workflows/sonar.yml
      - .github/workflows/osv-scan.yml
      - .github/workflows/reproducibility.yml
      - .github/workflows/actionlint.yml
      - .github/workflows/release.yml
    rationale: |
      ADR-0012 — All CI runs on the self-hosted runner pool labelled
      `[self-hosted, Linux, X64, vm103, noctalia-appmenu]` because integration
      tests need a real niri compositor. Public-CI is intentional only for
      Scorecard + CodeQL.

  concurrency-limits:
    ignore:
      - .github/workflows/scorecard.yml
      - .github/workflows/codeql.yml
    rationale: |
      Scheduled scans run weekly; concurrency cap is meaningless against
      the schedule cadence.
