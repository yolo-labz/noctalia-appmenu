rules:
  # Self-hosted-runner audit: workflows that intentionally target the
  # self-hosted pool — see ADR-0012 (self-hosted runner only) and
  # ADR-0013 (runner-agnostic labels). Integration tests need a real
  # niri compositor; public-hosted runners are intentional only for
  # Scorecard + CodeQL.
  self-hosted-runner:
    ignore:
      - .github/workflows/ci.yml
      - .github/workflows/sonar.yml
      - .github/workflows/osv-scan.yml
      - .github/workflows/reproducibility.yml
      - .github/workflows/actionlint.yml
      - .github/workflows/release.yml
      - .github/workflows/cargo-deny.yml
      - .github/workflows/cargo-machete.yml
      - .github/workflows/typos.yml
      - .github/workflows/semgrep.yml

  # Concurrency-limits audit: scheduled scans run weekly so a
  # concurrency cap is meaningless against the schedule cadence.
  concurrency-limits:
    ignore:
      - .github/workflows/scorecard.yml
      - .github/workflows/codeql.yml
