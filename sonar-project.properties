sonar.projectKey=yolo-labz_noctalia-appmenu
sonar.projectName=noctalia-appmenu
sonar.organization=yolo-labz

sonar.sources=bridge/src,plugin
sonar.tests=bridge/tests,tests

# Rust source language (Sonar treats *.rs via the community plugin or as
# generic source if no rust analyser is installed on the SonarQube
# instance — both are acceptable; we lean on cargo-clippy + qmllint
# SARIF uploads via codeql/upload-sarif for primary findings).
sonar.sourceEncoding=UTF-8

# Coverage feed (LCOV emitted by `cargo llvm-cov` in CI).
sonar.rust.lcov.reportPaths=bridge/lcov.info

# Exclusions
sonar.exclusions=\
  **/target/**,\
  **/result/**,\
  **/.direnv/**,\
  tools/fake-registrar/**,\
  flake.lock

sonar.coverage.exclusions=\
  bridge/src/main.rs,\
  bridge/src/bin/**,\
  bridge/tests/**

# QML is treated as generic source. qmllint SARIF is uploaded separately
# via github/codeql-action/upload-sarif and surfaces in the GitHub
# Security tab; SonarQube quality-gate is unaffected.

# Cognitive-complexity threshold per Rust function — the bridge's hot
# loops should not exceed this. Bumps require an ADR. Active deviation
# at v1.0.0: `find_app_for_pid` + `fetch_menu_tree` in bridge/src/atspi.rs
# — covered by ADR-0025 (cognitive-complexity-waiver), time-boxed to
# expire when Lane A's refactor lands OR at v1.0.1, whichever is first.
sonar.rust.cognitive.maximumComplexityPerFunction=15

# Coverage thresholds — v1.0.0 gate per FR-026 + spec 004 §FR-026.
# Overall line coverage ≥ 65 %; alpha-era 60 % floor superseded after
# the niri fixture-replay harness (PR #60) and active.json schema-v1
# coverage (PR #59) landed. The 65 % floor is achievable today with
# the mock AT-SPI fixture Lane A ships.
sonar.coverage.minimum=65

# UI-only quality-gate thresholds — applied server-side in the
# SonarQube web UI for project `yolo-labz_noctalia-appmenu`. The
# `.properties` file documents the expected values; only the UI gate
# enforces them on the merge commit.
#   - New-code line coverage          ≥ 80 %
#   - Code duplication (overall)      < 3 %
#   - Blocker issues                  = 0
#   - Critical issues                 = 0
#   - Security hotspots reviewed      100 % on new code
# See specs/004-project-completion/contracts/ci-required-checks.md
# §"Sonar quality gate (FR-026)".
