# Custom Semgrep rules tailored to the noctalia-appmenu-bridge codebase.
# Run via .github/workflows/semgrep.yml + lefthook pre-commit.
# Each rule must have a real reason — no cargo-cult lints.

rules:
  # NOTE: the `no-unwrap-outside-tests` rule was prototyped and
  # removed. semgrep paths.exclude only filters whole files, so tests
  # inline in `mod tests` blocks of source files (the idiomatic Rust
  # location) trigger false positives. Use `clippy::unwrap_used`
  # (configured via Cargo.toml lints) when adopting this gate —
  # clippy is module-aware via `#[cfg(test)]`.

  - id: no-raw-env-var
    pattern: std::env::var($X)
    paths:
      exclude:
        - "**/bridge/src/config.rs"
        - "**/tests/**"
        - "**/benches/**"
        - "**/build.rs"
    message: |
      Centralise environment-variable reads in `config.rs` so that
      misconfiguration surfaces at startup, not at first use. Add
      the new field to `Config` instead of reading inline.
    severity: WARNING
    languages: [rust]

  # NOTE: a tokio-spawn-must-handle-error rule was prototyped but
  # semgrep's rust pattern-matcher trips on `let h = tokio::spawn(…)`
  # bindings (false-positive on every legitimate spawn). Re-add via
  # a custom clippy lint when one becomes available. Reviewers should
  # still flag bare `tokio::spawn(…);` (no binding) by hand.

  - id: no-println-in-lib
    pattern-either:
      - pattern: println!(...)
      - pattern: eprintln!(...)
    paths:
      include:
        - "**/bridge/src/**/*.rs"
      exclude:
        - "**/bridge/src/main.rs"
        - "**/bridge/src/bin/**"
    message: |
      Use `tracing::{info,warn,error,debug}` — `println!` bypasses
      the structured-logging pipeline and never lands in journald
      JSON. `main.rs` is exempt for the `--version-json` print.
    severity: WARNING
    languages: [rust]

  - id: no-todo-fixme-in-prod
    pattern-regex: '(TODO|FIXME|XXX|HACK)\(?\)?'
    paths:
      exclude:
        - "**/tests/**"
        - "**/docs/**"
        - "**/specs/**"
        - "*.md"
    message: |
      Open a GitHub issue and reference it (e.g. `// gh-42: …`)
      instead of a bare TODO. Specs/docs are exempt.
    severity: WARNING
    languages: [rust]
